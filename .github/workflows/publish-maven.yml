name: Publish Maven Repository

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-maven
  cancel-in-progress: false

jobs:
  publish-maven:
    name: Publish Maven artifacts to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Publish artifacts to local Maven layout
        run: |
          rm -rf repo
          ./gradlew --no-daemon publish
          test -d repo/com/firedoge/kineticassembly

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Merge Maven artifacts into gh-pages
        run: |
          mkdir -p gh-pages/maven
          rsync -a repo/ gh-pages/maven/
          touch gh-pages/.nojekyll

      - name: Commit and push Maven repository
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll maven
          if git diff --cached --quiet; then
            echo "No Maven repository changes to publish."
            exit 0
          fi
          git commit -m "Publish Maven artifacts for ${GITHUB_REF_NAME}"
          git push origin gh-pages
